name: A/B Visual Regression V2 (Matrix Orchestrator)

on:
  workflow_dispatch:
    inputs:
      tenants:
        description: "JSON array of target tenants (e.g. [\"optimism\",\"uniswap\"])"
        required: true
        type: string
        default: '["optimism"]'
      ref:
        description: "Target branch reference for execution"
        required: false
        type: string
        default: "main"

jobs:
  visual-regression-matrix:
    name: "A/B Platform Check: ${{ matrix.tenant }}"
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    
    strategy:
      fail-fast: false  # Allow other tenants to finish even if one fails
      matrix:
        tenant: ${{ fromJSON(inputs.tenants) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Global Tenant Endpoints
        continue-on-error: true
        env:
          TENANT_CONTEXT: ${{ matrix.tenant }}
        run: |
          # V2 Matrix Override: Configure the native URLs mapped to this specific tenant context
          echo "We will execute logic specifically for: $TENANT_CONTEXT"
          
          # Pass the variables dynamically for the Sudheer Playwright loop
          if [ "$TENANT_CONTEXT" = "optimism" ]; then
             echo "OP_URL_A=https://vote.optimism.io" >> $GITHUB_ENV
          elif [ "$TENANT_CONTEXT" = "uniswap" ]; then
             echo "OP_URL_A=https://vote.uniswapfoundation.org" >> $GITHUB_ENV
          elif [ "$TENANT_CONTEXT" = "ens" ]; then
             echo "OP_URL_A=https://agora.ens.domains" >> $GITHUB_ENV
          else
             echo "OP_URL_A=https://agora.xyz" >> $GITHUB_ENV
          fi
          
      - name: Run Dedicated Tenant Assertion
        continue-on-error: true
        env:
          TENANT_CONTEXT: ${{ matrix.tenant }}
          URL_A: ${{ env.OP_URL_A }}
          # NOTE: Sudheer's backend logic for `feat/a-b-allProposals` will automatically scan through all CPLS proposals based on the domain URL or tenant context.
        run: npm run test:ab

      - name: Google Auth
        if: always()
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        if: always()
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: "silent-turbine-390703"

      - name: Upload Parallel Artifacts to GCP Bucket
        if: always()
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          TENANT_CONTEXT: ${{ matrix.tenant }}
        run: |
          chmod +x scripts/upload-ab-artifacts.sh
          # The script depends on GITHUB_RUN_ID natively. Since Playwright artifacts shouldn't collide inside a tenant sub-run (due to unique URL domains parsing inside), we just invoke the script cleanly.
          ./scripts/upload-ab-artifacts.sh
