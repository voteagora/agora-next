name: Visual A/B Regression Runner

on:
  push:
    branches:
      - feature/visual-ab-runner

jobs:
  visual-regression:
    name: Run Visual A/B Engine
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run A/B Regression Engine
        env:
          URL_A: 'https://vote.optimism.io'
          URL_B: 'https://agora-next-optimism-git-sudheer-archivedata-voteagora.vercel.app'
        run: npm run test:ab

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: "silent-turbine-390703"

      - name: Upload Artifacts to GCP Bucket
        if: always()
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/upload-ab-artifacts.sh
          ./scripts/upload-ab-artifacts.sh
