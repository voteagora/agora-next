name: A/B Visual Regression Tests

on:
  workflow_dispatch:
    inputs:
      url_a:
        description: "Base Production URL (e.g. https://vote.optimism.io)"
        required: true
        default: "https://vote.optimism.io"
        type: string
      url_b:
        description: "Preview URL to Compare (Vercel Branch Deployment)"
        required: true
        type: string

jobs:
  visual-regression:
    name: Run Visual A/B Engine
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run A/B Regression Engine
        continue-on-error: true
        env:
          URL_A: ${{ inputs.url_a }}
          URL_B: ${{ inputs.url_b }}
        run: npm run test:ab

      - name: Google Auth
        if: always()
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        if: always()
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: "silent-turbine-390703"

      - name: Upload Artifacts to GCP Bucket
        if: always()
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x scripts/upload-ab-artifacts.sh
          ./scripts/upload-ab-artifacts.sh
