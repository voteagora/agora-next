name: Uniswap Proposal Automation (Fawkes + Anvil)

on:
  workflow_dispatch:
    inputs:
      agoraNextVersion:
        description: "Agora-Next Branch/Tag to run against (defaults to current)"
        required: false
        default: ""

jobs:
  create-proposal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Agora-Next
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start Anvil Fork
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
        run: |
          # Run the official Anvil node exposing port 8545
          docker run -d -p 8545:8545 --name anvil-node --entrypoint anvil ghcr.io/foundry-rs/foundry:latest --host 0.0.0.0 --port 8545 --fork-url $MAINNET_RPC_URL

          # Wait for Anvil to start up
          echo "Waiting 15 seconds for Anvil to boot..."
          sleep 15
          
          echo "Checking Anvil container status and logs:"
          docker ps -a | grep anvil-node
          docker logs anvil-node || true

      - name: Impersonate Whale for Proposal Creation
        run: |
          # We use a known Uniswap whale (a16z) that has enough voting power to create a proposal
          WHALE_ADDRESS="0x2b591e99af9bd2ad008d0e17fc3be708e9ccab0f"

          echo "Telling local Anvil node to impersonate the whale account..."
          curl -X POST -H "Content-Type: application/json" \
            --data "{\"jsonrpc\":\"2.0\",\"method\":\"anvil_impersonateAccount\",\"params\":[\"${WHALE_ADDRESS}\"],\"id\":1}" \
            http://127.0.0.1:8545

          echo "Funding the whale account with ETH to pay for gas fees..."
          curl -X POST -H "Content-Type: application/json" \
            --data "{\"jsonrpc\":\"2.0\",\"method\":\"anvil_setBalance\",\"params\":[\"${WHALE_ADDRESS}\", \"0xDE0B6B3A7640000\"],\"id\":2}" \
            http://127.0.0.1:8545
      - name: Start Agora-Next Local Server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_AGORA_API_KEY: ${{ secrets.NEXT_PUBLIC_AGORA_API_KEY }}
          NEXT_PUBLIC_AGORA_ENV: prod
          NEXT_PUBLIC_AGORA_INSTANCE_NAME: uniswap
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_RPC_URL: http://127.0.0.1:8545
        run: |
          npm run build
          npm run start &
          # Wait for Next.js to start serving
          sleep 15

      - name: Run Fawkes Proposal E2E Test
        env:
          BASE_URL: http://localhost:3000
        run: |
          npx playwright test tests/web3/proposal-create.spec.ts --project=chromium
