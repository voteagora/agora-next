name: AI Security PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai_review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze PR Diff
        id: check_diff
        run: |
          git fetch origin ${{ github.base_ref }}
          if git diff origin/${{ github.base_ref }} HEAD | grep -E -q "[\"']use server[\"']"; then
            echo "has_server=true" >> $GITHUB_OUTPUT
          else
            echo "has_server=false" >> $GITHUB_OUTPUT
          fi

      - name: Execute Security Audit
        if: steps.check_diff.outputs.has_server == 'true'
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const script = require('./.github/scripts/ai-pr-review.js');
            await script({ github, context, core });
