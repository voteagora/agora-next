name: Playwright E2E Tests
run-name: ${{ github.actor }} - E2E Tests - ${{ github.repository }}

on:
  pull_request:
    branches:
      - "main"
      - "feature/*"
  push:
    branches:
      - "main"

jobs:
  playwright-e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: postgres://vercel:6uCyigrqdzZQh5bidsFb33hB@34.168.197.190/prod
      NEXT_PUBLIC_AGORA_ENV: production
      DAONODE_URL_TEMPLATE: https://optimism.agoradata.xyz

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-e2e
          path: playwright-report/
          retention-days: 14
